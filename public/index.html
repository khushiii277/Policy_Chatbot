<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Policy Assistant - Darkglass</title>
    <style>
        :root {
            /* Darkglass Theme Variables */
            --bg-gradient: radial-gradient(circle at top right, #1e293b, #0f172a 60%, #020617);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            /* Text Colors */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Brand Accents */
            --brand-primary: #3b82f6;
            --brand-hover: #60a5fa;
            
            /* Message Bubbles */
            --msg-user: rgba(59, 130, 246, 0.85);
            --msg-bot: rgba(255, 255, 255, 0.05);
            
            /* Enhanced Corner Radius */
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header */
        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.1);
        }

        .header-title h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #94a3b8;
            transition: background-color 0.3s ease;
            box-shadow: 0 0 8px currentColor;
        }

        .status-dot.connected { background-color: #22c55e; color: #22c55e; }
        .status-dot.connecting { background-color: #eab308; color: #eab308; }
        .status-dot.disconnected { background-color: #ef4444; color: #ef4444; }

        .status-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Message Display Window */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Custom Scrollbar for Chat Box */
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            gap: 4px; /* Space between message bubble and timestamp */
        }

        .message-wrapper.user {
            margin-left: auto;
            align-items: flex-end;
        }

        .message-wrapper.bot {
            margin-right: auto;
            align-items: flex-start;
        }

        .message {
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .user .message {
            background-color: var(--msg-user);
            color: white;
            border-bottom-right-radius: 4px; /* Sharper corner pointing to user */
        }

        .bot .message {
            background-color: var(--msg-bot);
            color: var(--text-main);
            border-top-left-radius: 4px; /* Sharper corner pointing to bot */
            border: 1px solid var(--glass-border);
        }

        /* Timestamp Styling */
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .user .timestamp { text-align: right; margin-right: 4px; }
        .bot .timestamp { text-align: left; margin-left: 4px; }

        /* System Notifications & Loaders */
        .system-notification {
            align-self: center;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 20px;
            background: var(--msg-bot);
            border-radius: var(--radius-lg);
            border-top-left-radius: 4px;
            border: 1px solid var(--glass-border);
            align-self: flex-start;
            backdrop-filter: blur(4px);
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1.0); opacity: 1; }
        }

        /* Suggestions Row */
        .suggestions-container {
            padding: 0 ;
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
        }
        /* Bulletproof right and left spacing for flex scroll containers */
        .suggestions-container::before,
        .suggestions-container::after {
            content: '';
            flex: 0 0 18px; /* 18px invisible block + 10px gap = exactly 28px of space! */
        }

        .suggestions-container::-webkit-scrollbar { display: none; }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-main);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .suggestion-chip:last-child {
            margin-right: 28px;
        }

        .suggestion-chip:hover {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: white;
            transform: translateY(-1px);
        }

        /* Input Controls Area */
        .input-area {
            padding: 16px 28px 28px 28px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.1);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            border-color: var(--brand-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 0 28px;
            background-color: var(--brand-primary);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        button:hover {
            background-color: var(--brand-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-header">
        <div class="header-title">
            <h1>Internal Policy Assistant</h1>
        </div>
        <div class="status-container">
            <div id="statusDot" class="status-dot connecting"></div>
            <div id="statusText" class="status-text">Connecting...</div>
        </div>
    </div>

    <div class="chat-box" id="chatBox">
        </div>

    <div class="suggestions-container">
        <div class="suggestion-chip" onclick="clickSuggestion(this)">Remote work policy core hours?</div>
        <div class="suggestion-chip" onclick="clickSuggestion(this)">Wellness stipend for fitness equipment?</div>
        <div class="suggestion-chip" onclick="clickSuggestion(this)">How do I claim health insurance?</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ask about company guidelines or policy documents..." autocomplete="off" onkeydown="if(event.key === 'Enter') sendMessage()">
        </div>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const ws = new WebSocket("ws://localhost:8000/ws/chat");
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    let activeIndicator = null;

    // Utility to get current time in HH:MM AM/PM format
    function getCurrentTime() {
        return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    ws.onopen = () => {
        statusDot.className = "status-dot connected";
        statusText.innerText = "Secure Connection Active";
        appendSystemNotification("Connected to corporate knowledge database.");
    };

    ws.onmessage = (event) => {
        const rawMsg = event.data;
        
        if (rawMsg.startsWith("SYSTEM: Searching")) {
            showTypingIndicator();
        } else if (rawMsg.startsWith("BOT:")) {
            hideTypingIndicator();
            const textContent = rawMsg.replace("BOT:", "").trim();
            appendMessage(textContent, "bot");
        } else if (rawMsg.startsWith("SYSTEM:")) {
            hideTypingIndicator();
            appendSystemNotification(rawMsg.replace("SYSTEM:", "").trim());
        }
    };

    ws.onclose = () => {
        statusDot.className = "status-dot disconnected";
        statusText.innerText = "Disconnected";
        hideTypingIndicator();
        appendSystemNotification("Session connection closed.");
    };

    function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        ws.send(text);
        userInput.value = "";
    }

    function clickSuggestion(element) {
        userInput.value = element.innerText;
        sendMessage();
    }

    function appendMessage(text, sender) {
        // Create the outer wrapper that holds both message and timestamp
        const wrapper = document.createElement("div");
        wrapper.classList.add("message-wrapper", sender);

        // Create the message bubble
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message");
        msgDiv.innerText = text;

        // Create the timestamp element
        const timeDiv = document.createElement("div");
        timeDiv.classList.add("timestamp");
        timeDiv.innerText = getCurrentTime();

        // Append both to the wrapper
        wrapper.appendChild(msgDiv);
        wrapper.appendChild(timeDiv);

        // Add to DOM
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendSystemNotification(text) {
        const notice = document.createElement("div");
        notice.classList.add("system-notification");
        notice.innerText = text;
        chatBox.appendChild(notice);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTypingIndicator() {
        if (activeIndicator) return;
        
        // Wrap the indicator so it aligns properly like a message bubble
        activeIndicator = document.createElement("div");
        activeIndicator.classList.add("message-wrapper", "bot");
        
        const innerIndicator = document.createElement("div");
        innerIndicator.classList.add("typing-indicator");
        innerIndicator.innerHTML = `
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        `;
        
        activeIndicator.appendChild(innerIndicator);
        chatBox.appendChild(activeIndicator);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function hideTypingIndicator() {
        if (activeIndicator) {
            activeIndicator.remove();
            activeIndicator = null;
        }
    }
</script>
</body>
</html>
